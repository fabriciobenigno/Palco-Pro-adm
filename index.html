<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#020409" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Palco Pro Admin</title>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --bg-1: #020409;
      --bg-2: #08111e;
      --bg-3: #04070d;
      --card-1: rgba(13,19,31,0.96);
      --card-2: rgba(7,11,19,0.94);
      --text: #f7f9ff;
      --muted: rgba(255,255,255,0.72);
      --soft: rgba(255,255,255,0.54);
      --blue-1: rgba(118,203,255,0.98);
      --blue-2: rgba(76,150,255,0.96);
      --blue-3: rgba(137,216,255,0.94);
      --green-1: rgba(72,214,138,0.98);
      --green-2: rgba(27,168,94,0.95);
      --red-1: rgba(255,111,111,0.98);
      --red-2: rgba(238,65,65,0.94);
      --amber-1: rgba(255,204,104,0.98);
      --amber-2: rgba(233,166,44,0.94);
      --shadow: 0 26px 70px rgba(0,0,0,0.42), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% -10%, rgba(79,140,255,0.22), transparent 28%),
        radial-gradient(circle at 50% 12%, rgba(255,255,255,0.04), transparent 34%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body { position: fixed; inset: 0; }
    button, input, textarea { font: inherit; }
    button { border: 0; }

    .app {
      width: 100vw;
      height: 100dvh;
      display: grid;
      grid-template-rows: 1fr;
      overflow: hidden;
      padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
      background:
        radial-gradient(circle at 50% -10%, rgba(79,140,255,0.22), transparent 28%),
        radial-gradient(circle at 50% 12%, rgba(255,255,255,0.04), transparent 34%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
    }

    .surface {
      background: linear-gradient(180deg, var(--card-1), var(--card-2));
      border: 0;
      border-radius: 0;
      box-shadow: none;
      backdrop-filter: blur(22px);
    }

    .auth-card, .main-card {
      padding: 14px;
      display: grid;
      gap: 10px;
      min-height: 100%;
    }

    .main-card {
      grid-template-rows: 1fr;
      align-items: center;
    }

    .panel-title { display: grid; gap: 4px; }
    .panel-title h2 { margin: 0; font-size: 17px; letter-spacing: -0.02em; }
    .panel-title p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.45; }

    .field { display: grid; gap: 8px; }
    .field label { color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 600; }

    input, textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #fff;
      border-radius: 18px;
      padding: 12px 14px;
      outline: none;
    }

    textarea { min-height: 190px; resize: vertical; }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.42); }

    .toggle-password-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .toggle-password-row input {
      width: 18px;
      height: 18px;
      accent-color: #6cb7ff;
      margin: 0;
    }

    .btn {
      color: #fff;
      cursor: pointer;
      min-height: 46px;
      border-radius: 18px;
      padding: 11px 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
      transition: transform .18s ease, opacity .18s ease;
      box-shadow: 0 18px 36px rgba(0,0,0,0.24), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: .58; cursor: default; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue-1), var(--blue-2), var(--blue-3));
      background-size: 220% 220%;
      animation: flow 7.5s ease-in-out infinite;
      border: 1px solid rgba(169,229,255,0.36);
    }

    .btn-secondary {
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
      border: 1px solid rgba(255,255,255,0.14);
    }

    .status-line { min-height: 18px; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .badge { display: none !important; }
    .sticky-account, #mainStatus { display: none !important; }

    .menu-wrap {
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .menu-block {
      width: 100%;
      max-width: 360px;
      display: grid;
      gap: 14px;
    }

    .menu-title { text-align: center; }
    .menu-title h2 {
      margin: 0;
      font-size: clamp(24px, 6vw, 30px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .menu-grid { width: 100%; display: grid; gap: 10px; }
    .menu-btn { min-height: 52px; border-radius: 18px; text-align: center; font-size: 15px; padding: 10px 14px; }

    .panel-screen {
      position: fixed;
      inset: 0;
      z-index: 50;
      padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
      background:
        radial-gradient(circle at 50% -10%, rgba(79,140,255,0.18), transparent 28%),
        linear-gradient(180deg, rgba(2,4,9,0.98), rgba(8,17,30,0.98), rgba(4,7,13,0.99));
      display: none;
    }

    .panel-screen.active { display: block; }

    .panel-shell {
      height: 100%;
      border-radius: 0;
      border: 0;
      background: linear-gradient(180deg, rgba(13,19,31,0.96), rgba(7,11,19,0.94));
      box-shadow: none;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      overflow: hidden;
    }

    .panel-header { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .panel-header h2 { margin: 0; font-size: 17px; letter-spacing: -0.02em; }
    .header-copy { display: grid; gap: 4px; min-width: 0; }
    .header-copy p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.4; }
    .header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

    .icon-btn {
      width: 40px;
      min-width: 40px;
      height: 40px;
      border-radius: 14px;
      background: rgba(255,255,255,0.07);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.10);
      cursor: pointer;
      font-size: 18px;
    }

    .panel-tools { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); display: grid; gap: 10px; }
    .list-area { overflow: auto; padding: 0 12px 8px; display: grid; gap: 0; align-content: start; }
    .panel-footer { padding: 8px 12px 10px; color: var(--muted); font-size: 11px; line-height: 1.4; }
    .empty { padding: 18px; border-radius: 20px; border: 1px dashed rgba(255,255,255,0.12); color: var(--muted); text-align: center; line-height: 1.6; margin-top: 10px; }
    .search-input { width: 100%; }

    .swipe-row {
      --swipe-reveal-width: 0px;
      position: relative;
      overflow: hidden;
      border-radius: 0;
      min-height: 46px;
      height: 46px;
      touch-action: pan-y;
      background: transparent;
      border: 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-shadow: none;
      margin: 0;
    }

    .swipe-actions {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: var(--swipe-reveal-width);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      padding: 0 8px 0 6px;
      z-index: 0;
      pointer-events: none;
      background: transparent;
    }

    .action-btn {
      width: 34px;
      height: 34px;
      min-height: 34px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 6px 14px rgba(0,0,0,0.16);
      opacity: 0;
      transform: translateX(18px) scale(0.96);
      transition: opacity 0.18s ease, transform 0.18s ease;
      pointer-events: none;
      flex: 0 0 34px;
      padding: 0;
    }

    .action-btn.approve { background: linear-gradient(180deg, var(--green-1), var(--green-2)); }
    .action-btn.edit { background: linear-gradient(180deg, var(--blue-1), var(--blue-2)); }
    .action-btn.disable { background: linear-gradient(180deg, var(--amber-1), var(--amber-2)); color: #1f1404; }
    .action-btn.delete { background: linear-gradient(180deg, var(--red-1), var(--red-2)); }

    .swipe-content {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 46px;
      height: 46px;
      padding: 0 12px;
      border: 0;
      border-radius: 0;
      background: rgba(18,22,30,0.96);
      box-shadow: none;
      color: #fff;
      text-align: left;
      transform: translateX(0);
      transition: transform 0.22s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      overflow: hidden;
      touch-action: pan-y;
    }

    .swipe-row.revealed .swipe-content { transform: translateX(calc(var(--swipe-reveal-width) * -1)); }
    .swipe-row.revealed .action-btn, .swipe-row.swiping .action-btn { opacity: 1; transform: translateX(0) scale(1); pointer-events: auto; }

    .row-main { display: grid; gap: 1px; width: 100%; }
    .row-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; min-width: 0; }
    .row-title { margin: 0; font-size: 14px; line-height: 1.2; font-weight: 700; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1; }
    .row-meta { color: var(--muted); font-size: 12px; line-height: 1.2; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .row-user { color: rgba(255,255,255,0.84); font-size: 11px; line-height: 1.2; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .mini-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 20px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.10);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .mini-badge.success { background: rgba(72,214,138,0.14); color: #9ef1c4; }
    .mini-badge.warning { background: rgba(255,204,104,0.14); color: #ffd992; }
    .mini-badge.danger { background: rgba(255,111,111,0.14); color: #ffc2c2; }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 70;
      display: none;
      padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
      background: rgba(1, 3, 8, 0.72);
      backdrop-filter: blur(10px);
    }

    .modal.active { display: block; }

    .modal-card {
      height: 100%;
      border-radius: 0;
      border: 0;
      background: linear-gradient(180deg, rgba(13,19,31,0.98), rgba(7,11,19,0.96));
      box-shadow: none;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .modal-head { padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .modal-head h3 { margin: 0; font-size: 18px; letter-spacing: -0.02em; }
    .modal-body { overflow: auto; padding: 14px; display: grid; gap: 12px; align-content: start; }
    .modal-foot { padding: 14px; border-top: 1px solid rgba(255,255,255,0.08); display: grid; gap: 10px; }

    .detail-block { padding: 14px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); display: grid; gap: 8px; }
    .detail-block label { color: var(--soft); font-size: 12px; font-weight: 700; letter-spacing: 0.02em; text-transform: uppercase; }
    .detail-block div { color: #fff; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
    .form-grid { display: grid; gap: 12px; }
    .hidden { display: none !important; }

    @keyframes flow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="authCard" class="surface auth-card">
      <div class="panel-title">
        <h2>Entrar como administrador</h2>
        <p>Faça login para liberar o painel.</p>
      </div>

      <div class="field">
        <label for="emailInput">E-mail</label>
        <input id="emailInput" type="email" inputmode="email" autocomplete="email" placeholder="Seu e-mail" />
      </div>

      <div class="field">
        <label for="passwordInput">Senha</label>
        <input id="passwordInput" type="password" autocomplete="current-password" placeholder="Sua senha" />
        <label class="toggle-password-row" for="showPasswordToggle">
          <input id="showPasswordToggle" type="checkbox" />
          <span>Mostrar senha</span>
        </label>
      </div>

      <button id="loginBtn" type="button" class="btn btn-primary">Entrar</button>
      <div id="authStatus" class="status-line"></div>
    </section>

    <section id="adminPanel" class="surface main-card hidden">
      <div class="sticky-account">
        <div>
          <strong id="accountLabel">Conta conectada</strong>
          <span>Painel liberado para administração</span>
        </div>
        <button id="logoutBtn" type="button" class="btn btn-secondary">Sair da conta</button>
      </div>

      <div class="menu-wrap">
        <div class="menu-block">
          <div class="menu-title">
            <h2>Palco Pro Adm</h2>
          </div>
          <div class="menu-grid">
            <button id="openPendingBtn" type="button" class="btn btn-primary menu-btn">Músicas pendentes</button>
            <button id="openApprovedBtn" type="button" class="btn btn-primary menu-btn">Músicas aprovadas</button>
            <button id="openInactiveBtn" type="button" class="btn btn-primary menu-btn">Músicas inativas</button>
            <button id="openUsersBtn" type="button" class="btn btn-primary menu-btn">Usuários</button>
          </div>
        </div>
      </div>

      <div id="mainStatus" class="status-line"></div>
    </section>
  </main>

  <script>
    const state = { suggestions: [], songs: [] };
    function normalizeText(value) { return String(value || '').trim(); }
    function normalizeMatchText(value) { return normalizeText(value).normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().replace(/\s+/g, ' '); }
    function idsEqual(a, b) { return String(a ?? '') === String(b ?? ''); }
    function buildSongSignature(song) {
      const title = normalizeMatchText(song?.song_title || song?.title || '');
      const artist = normalizeMatchText(song?.artist || '');
      if (!title) return '';
      return artist ? `${title}::${artist}` : title;
    }
    function getActiveSuggestionBySongId(songId) { return state.suggestions.find((item) => idsEqual(item.source_song_id, songId) && item.active === true) || null; }
    function getActiveSuggestionBySongSignature(song) {
      const signature = buildSongSignature(song);
      if (!signature) return null;
      return state.suggestions.find((item) => item.active === true && buildSongSignature(item) === signature) || null;
    }
    function getPendingSongs() {
      return state.songs
        .filter((song) => !getActiveSuggestionBySongId(song.id) && !getActiveSuggestionBySongSignature(song))
        .sort((a, b) => (a.song_title || '').localeCompare((b.song_title || ''), 'pt-BR', { sensitivity: 'base' }));
    }
  </script>
</body>
</html>
