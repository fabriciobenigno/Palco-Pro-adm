<!-- ATUALIZAÇÃO: Seleção múltipla refinada nos 3 painéis + melhorias visuais, performance e segurança -->
<style>
  .multi-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 18px;
    background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)), rgba(10,17,29,0.82);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .multi-counter {
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    padding: 0 4px;
  }

  .selectable-row {
    position: relative;
    overflow: hidden;
    border-radius: 20px;
    min-height: 58px;
    height: 58px;
    cursor: pointer;
  }

  .selectable-card {
    width: 100%;
    min-height: 58px;
    height: 58px;
    padding: 0 14px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)), rgba(15,21,34,0.94);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    display: flex;
    align-items: center;
    gap: 12px;
    transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
  }

  .selectable-row.selected .selectable-card {
    border-color: rgba(133, 208, 255, 0.45);
    background: linear-gradient(180deg, rgba(116,200,255,0.12), rgba(74,137,255,0.08)), rgba(15,21,34,0.98);
    box-shadow: 0 0 0 3px rgba(74,137,255,0.12), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: translateY(-1px);
  }

  .check-shell {
    width: 24px;
    height: 24px;
    border-radius: 999px;
    border: 1px solid rgba(190,224,255,0.22);
    background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)), rgba(8,13,24,0.92);
    display: grid;
    place-items: center;
    flex: 0 0 24px;
    transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
  }

  .check-shell::after {
    content: '';
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: transparent;
    transform: scale(0.4);
    transition: transform .18s ease, background .18s ease;
  }

  .selectable-row.selected .check-shell {
    border-color: rgba(157, 223, 255, 0.5);
    background: linear-gradient(180deg, var(--blue-1), var(--blue-2));
    box-shadow: 0 0 18px rgba(116,200,255,0.28);
    transform: scale(1.04);
  }

  .selectable-row.selected .check-shell::after {
    background: #08111f;
    transform: scale(1);
  }
</style>

<script>
// ==========================
// ESTADO GLOBAL MULTISELECT
// ==========================
state.multiSelect = {
  active: false,
  panel: null,
  selected: new Set(),
  busy: false
};

function isMulti(panel) {
  return state.multiSelect.active && state.multiSelect.panel === panel;
}

function clearMultiSelect() {
  state.multiSelect.active = false;
  state.multiSelect.panel = null;
  state.multiSelect.selected.clear();
  state.multiSelect.busy = false;
}

function toggleMultiSelect(panel) {
  const isSamePanel = state.multiSelect.active && state.multiSelect.panel === panel;
  if (isSamePanel) {
    clearMultiSelect();
  } else {
    state.multiSelect.active = true;
    state.multiSelect.panel = panel;
    state.multiSelect.selected.clear();
    state.multiSelect.busy = false;
    closeAllSwipes();
  }
  rerenderAdminLists();
}

function toggleItemSelection(id) {
  if (!state.multiSelect.active || state.multiSelect.busy) return;
  const key = String(id);
  if (state.multiSelect.selected.has(key)) state.multiSelect.selected.delete(key);
  else state.multiSelect.selected.add(key);
  rerenderAdminLists();
}

function getSelectedIds() {
  return Array.from(state.multiSelect.selected);
}

function createActionBtn(label, fn, variant = 'primary') {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = `btn ${variant === 'secondary' ? 'btn-secondary' : 'btn-primary'}`;
  btn.textContent = label;
  btn.onclick = fn;
  return btn;
}

function createMultiToolbar(panel) {
  const wrap = document.createElement('div');
  wrap.className = 'multi-toolbar';

  const toggleBtn = createActionBtn(isMulti(panel) ? 'Cancelar seleção' : 'Selecionar', () => toggleMultiSelect(panel), 'secondary');
  wrap.appendChild(toggleBtn);

  if (!isMulti(panel)) return wrap;

  const count = document.createElement('span');
  count.className = 'multi-counter';
  count.textContent = `${getSelectedIds().length} selecionada${getSelectedIds().length === 1 ? '' : 's'}`;
  wrap.appendChild(count);

  if (panel === 'pending') {
    wrap.appendChild(createActionBtn('Aprovar', () => batchAction('approve', panel)));
    wrap.appendChild(createActionBtn('Excluir', () => batchAction('delete', panel)));
  }

  if (panel === 'approved') {
    wrap.appendChild(createActionBtn('Desabilitar', () => batchAction('disable', panel)));
    wrap.appendChild(createActionBtn('Excluir', () => batchAction('delete', panel)));
  }

  if (panel === 'inactive') {
    wrap.appendChild(createActionBtn('Aprovar', () => batchAction('activate', panel)));
    wrap.appendChild(createActionBtn('Excluir', () => batchAction('delete', panel)));
  }

  return wrap;
}

function createSelectableRow(panel, item, title, meta, extra) {
  const row = document.createElement('div');
  row.className = `selectable-row ${state.multiSelect.selected.has(String(item.id)) ? 'selected' : ''}`;
  row.innerHTML = `
    <div class="selectable-card">
      <div class="check-shell"></div>
      <div class="row-main">
        <div class="row-top"><h3 class="row-title">${escapeHtml(title)}</h3></div>
        <div class="row-meta">${escapeHtml(meta || '')}</div>
        ${extra ? `<div class="row-user">${escapeHtml(extra)}</div>` : ''}
      </div>
    </div>
  `;
  row.addEventListener('click', () => toggleItemSelection(item.id));
  return row;
}

// ==========================
// AÇÕES EM LOTE OTIMIZADAS
// ==========================
async function batchAction(type, panel) {
  const ids = getSelectedIds();
  if (!ids.length || state.multiSelect.busy) return;

  if (type === 'delete') {
    const confirmed = window.confirm(`Tem certeza que deseja excluir ${ids.length} música${ids.length === 1 ? '' : 's'}? Essa ação não pode ser desfeita.`);
    if (!confirmed) return;
  }

  state.multiSelect.busy = true;
  setPanelStatus(panel, 'Executando ação em lote...');

  try {
    const supabase = createSupabaseClient();

    if (type === 'approve') {
      const songsToApprove = state.songs.filter((item) => ids.includes(String(item.id)));
      const upserts = songsToApprove.map((song) => {
        const existing = getSuggestionBySongId(song.id);
        const payload = {
          source_song_id: song.id,
          song_title: song.song_title || '',
          artist: song.artist || '',
          style: song.style || '',
          lyrics: sanitizeLyrics(song.lyrics || ''),
          active: true
        };
        if (existing) {
          return supabase.from('approved_suggestions').update(payload).eq('id', existing.id).select('*').single();
        }
        return supabase.from('approved_suggestions').insert(payload).select('*').single();
      });
      const results = await Promise.all(upserts);
      const failed = results.find((r) => r.error);
      if (failed) throw failed.error;
      results.forEach((r) => mergeSuggestionRecord(r.data));
    }

    if (type === 'disable') {
      const tasks = ids.map((id) => supabase.from('approved_suggestions').update({ active: false }).eq('id', id).select('*').single());
      const results = await Promise.all(tasks);
      const failed = results.find((r) => r.error);
      if (failed) throw failed.error;
      results.forEach((r) => mergeSuggestionRecord(r.data));
    }

    if (type === 'activate') {
      const tasks = ids.map((id) => supabase.from('approved_suggestions').update({ active: true }).eq('id', id).select('*').single());
      const results = await Promise.all(tasks);
      const failed = results.find((r) => r.error);
      if (failed) throw failed.error;
      results.forEach((r) => mergeSuggestionRecord(r.data));
    }

    if (type === 'delete') {
      const tasks = ids.map((id) => supabase.from('approved_suggestions').delete().eq('id', id));
      const results = await Promise.all(tasks);
      const failed = results.find((r) => r.error);
      if (failed) throw failed.error;
      state.suggestions = state.suggestions.filter((item) => !ids.includes(String(item.id)));
    }

    state.multiSelect.selected.clear();
    rerenderAdminLists();
    setPanelStatus(panel, 'Ação em lote concluída com sucesso.');
  } catch (error) {
    setPanelStatus(panel, `Erro na ação em lote: ${error?.message || 'falha desconhecida'}`);
  } finally {
    state.multiSelect.busy = false;
    rerenderAdminLists();
  }
}

// ==========================
// RENDER FUNCTIONS REESCRITAS
// ==========================
renderPendingList = function () {
  const items = applySearch(getPendingSongs().map((song) => ({ ...song, account_email: getUserEmail(song.user_id) })), 'pending');
  pendingList.innerHTML = '';
  pendingList.appendChild(createMultiToolbar('pending'));

  if (!items.length) {
    pendingList.innerHTML += '<div class="empty">Nenhuma música pendente encontrada.</div>';
    setPanelStatus('pending', 'Use a seleção múltipla para aprovar ou excluir em lote.');
    return;
  }

  items.forEach((song) => {
    if (isMulti('pending')) {
      pendingList.appendChild(createSelectableRow('pending', song, song.song_title || 'Sem título', `${song.artist || 'Sem artista'} • ${song.style || 'Sem estilo'}`, `Conta: ${song.account_email}`));
    } else {
      pendingList.appendChild(createSwipeRow({
        key: `pending-${song.id}`,
        revealWidth: 140,
        actions: [
          { icon: '✔', className: 'approve', aria: 'Aprovar música', onClick: () => handleApproveSong(song.id) },
          { icon: '✎', className: 'edit', aria: 'Editar música', onClick: () => openSongEditFromPending(song.id) },
          { icon: '🗑', className: 'delete', aria: 'Excluir música', onClick: () => handleDeletePendingSong(song.id) }
        ],
        onOpenDetail: () => openSongDetail(song),
        title: song.song_title || 'Sem título',
        meta: `${song.artist || 'Sem artista'} • ${song.style || 'Sem estilo'}`,
        extra: `Conta: ${song.account_email}`,
        badge: getPendingBadge()
      }));
    }
  });

  setPanelStatus('pending', `${items.length} música${items.length > 1 ? 's' : ''} pendente${items.length > 1 ? 's' : ''}.`);
};

renderApprovedList = function () {
  const items = applySearch(getApprovedSuggestions(), 'approved');
  approvedList.innerHTML = '';
  approvedList.appendChild(createMultiToolbar('approved'));

  if (!items.length) {
    approvedList.innerHTML += '<div class="empty">Nenhuma música aprovada ativa encontrada.</div>';
    setPanelStatus('approved', 'Use a seleção múltipla para desabilitar ou excluir em lote.');
    return;
  }

  items.forEach((item) => {
    if (isMulti('approved')) {
      approvedList.appendChild(createSelectableRow('approved', item, item.song_title || 'Sem título', `${item.artist || 'Sem artista'} • ${item.style || 'Sem estilo'}`, `Origem: ${getOriginEmailBySongId(item.source_song_id)}`));
    } else {
      approvedList.appendChild(createSwipeRow({
        key: `approved-${item.id}`,
        revealWidth: 140,
        actions: [
          { icon: '⏸', className: 'disable', aria: 'Desabilitar música', onClick: () => handleDisableSuggestion(item.id) },
          { icon: '✎', className: 'edit', aria: 'Editar música', onClick: () => openEditModal(item.id) },
          { icon: '🗑', className: 'delete', aria: 'Excluir música', onClick: () => handleDeleteSuggestion(item.id) }
        ],
        onOpenDetail: () => openSuggestionDetail(item, 'approved'),
        title: item.song_title || 'Sem título',
        meta: `${item.artist || 'Sem artista'} • ${item.style || 'Sem estilo'}`,
        extra: `Origem: ${getOriginEmailBySongId(item.source_song_id)}`,
        badge: getApprovedBadge()
      }));
    }
  });

  setPanelStatus('approved', `${items.length} música${items.length > 1 ? 's' : ''} aprovada${items.length > 1 ? 's' : ''} ativa${items.length > 1 ? 's' : ''}.`);
};

renderInactiveList = function () {
  const items = applySearch(getInactiveSuggestions(), 'inactive');
  inactiveList.innerHTML = '';
  inactiveList.appendChild(createMultiToolbar('inactive'));

  if (!items.length) {
    inactiveList.innerHTML += '<div class="empty">Nenhuma música inativa encontrada.</div>';
    setPanelStatus('inactive', 'Use a seleção múltipla para aprovar ou excluir em lote.');
    return;
  }

  items.forEach((item) => {
    if (isMulti('inactive')) {
      inactiveList.appendChild(createSelectableRow('inactive', item, item.song_title || 'Sem título', `${item.artist || 'Sem artista'} • ${item.style || 'Sem estilo'}`, `Origem: ${getOriginEmailBySongId(item.source_song_id)}`));
    } else {
      inactiveList.appendChild(createSwipeRow({
        key: `inactive-${item.id}`,
        revealWidth: 140,
        actions: [
          { icon: '✔', className: 'approve', aria: 'Ativar música', onClick: () => handleActivateSuggestion(item.id) },
          { icon: '✎', className: 'edit', aria: 'Editar música', onClick: () => openEditModal(item.id) },
          { icon: '🗑', className: 'delete', aria: 'Excluir música', onClick: () => handleDeleteSuggestion(item.id) }
        ],
        onOpenDetail: () => openSuggestionDetail(item, 'inactive'),
        title: item.song_title || 'Sem título',
        meta: `${item.artist || 'Sem artista'} • ${item.style || 'Sem estilo'}`,
        extra: `Origem: ${getOriginEmailBySongId(item.source_song_id)}`,
        badge: getInactiveBadge()
      }));
    }
  });

  setPanelStatus('inactive', `${items.length} música${items.length > 1 ? 's' : ''} inativa${items.length > 1 ? 's' : ''}.`);
};

// ==========================
// FUNÇÕES COMPLEMENTARES
// ==========================
async function handleDeletePendingSong(songId) {
  const confirmed = window.confirm('Tem certeza que deseja excluir esta música pendente?');
  if (!confirmed) return;
  const supabase = createSupabaseClient();
  setPanelStatus('pending', 'Excluindo música pendente...');
  const { error } = await supabase.from('songs').delete().eq('id', songId);
  if (error) {
    setPanelStatus('pending', `Erro ao excluir: ${error.message}`);
    return;
  }
  state.songs = state.songs.filter((item) => !idsEqual(item.id, songId));
  rerenderAdminLists();
  setPanelStatus('pending', 'Música pendente excluída com sucesso.');
}

function openSongEditFromPending(songId) {
  const song = state.songs.find((item) => idsEqual(item.id, songId));
  if (!song) return;
  state.editSuggestionId = null;
  editTitle.value = song.song_title || '';
  editArtist.value = song.artist || '';
  editStyle.value = song.style || '';
  editLyrics.value = song.lyrics || '';
  editStatus.textContent = 'Ao salvar, esta música pendente será atualizada diretamente na tabela songs.';
  editModal.classList.add('active');
  saveEditBtn.onclick = async () => {
    const supabase = createSupabaseClient();
    editStatus.textContent = 'Salvando alterações...';
    const payload = {
      song_title: normalizeText(editTitle.value),
      artist: normalizeText(editArtist.value),
      style: normalizeText(editStyle.value),
      lyrics: sanitizeLyrics(editLyrics.value)
    };
    const { data, error } = await supabase.from('songs').update(payload).eq('id', songId).select('*').single();
    if (error) {
      editStatus.textContent = `Erro ao salvar: ${error.message}`;
      return;
    }
    const idx = state.songs.findIndex((item) => idsEqual(item.id, songId));
    if (idx >= 0) state.songs[idx] = data;
    rerenderAdminLists();
    editStatus.textContent = 'Alterações salvas com sucesso.';
    setTimeout(() => {
      closeEditModal();
      saveEditBtn.onclick = saveEditedSuggestion;
    }, 350);
  };
}

const originalCloseEditModal = closeEditModal;
closeEditModal = function () {
  saveEditBtn.onclick = saveEditedSuggestion;
  originalCloseEditModal();
};
</script>
